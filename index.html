<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My TV</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0014;
  color:white;
}

/* Video Player Top */
.player{
  width:100%;
  background:black;
  position:sticky;
  top:0;
  z-index:1000;
}

video{
  width:100%;
  height:220px;
  background:black;
}

/* Section */
.section{
  padding:15px 10px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.channels{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.channel{
  min-width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  background:white;
  cursor:pointer;
}

.channel img{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>
<body>

<!-- Video Player (Always Top) -->
<div class="player">
  <video id="videoPlayer" controls autoplay>
    <source id="videoSource" src="" type="application/x-mpegURL">
  </video>
</div>

<!-- Bangladeshi Channels -->
<div class="section">
  <div class="section-title">
    <span>বাংলাদেশি চ্যানেল</span>
    <span>View All</span>
  </div>

  <div class="channels">
    <div class="channel" onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
      <img src="https://via.placeholder.com/150/ff0000/ffffff?text=Channel+1">
    </div>

    <div class="channel" onclick="playChannel('https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8')">
      <img src="https://via.placeholder.com/150/00ff00/ffffff?text=Channel+2">
    </div>
  </div>
</div>

<!-- Sports Channels -->
<div class="section">
  <div class="section-title">
    <span>Sports Channels</span>
    <span>View All</span>
  </div>

  <div class="channels">
    <div class="channel" onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">
      <img src="https://via.placeholder.com/150/0000ff/ffffff?text=EPL+1">
    </div>
  </div>
</div>

<script>
function playChannel(url){
  var video = document.getElementById("videoPlayer");
  var source = document.getElementById("videoSource");

  source.src = url;
  video.load();
  video.play();
}
</script>

</body>
</html>
