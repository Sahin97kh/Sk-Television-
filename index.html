<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Television</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0014;
color:white;
padding-top:220px;
}

.player{
position:fixed;
top:0;
left:0;
width:100%;
background:black;
z-index:1000;
}

video{
width:100%;
height:220px;
background:black;
}

#videoPlaceholder{
position:absolute;
top:0;
left:0;
width:100%;
height:220px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
background:black;
color:white;
}

/* running notice */

#runningText{
position:absolute;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,0.85);
color:#00ffd0;
font-size:13px;
padding:5px 0;
}

.phone{
color:red;
font-weight:bold;
}

#prevBtn,#nextBtn{
display:none;
}

.section{
padding:10px 0;
}

.section-title{
display:flex;
justify-content:space-between;
padding:0 15px;
margin-bottom:8px;
font-size:18px;
}

.channels{
display:flex;
overflow-x:auto;
padding:0 15px;
gap:15px;
}

.channels::-webkit-scrollbar{
display:none;
}

.channel{
flex:0 0 22%;
text-align:center;
cursor:pointer;
}

.channel img{
width:100%;
aspect-ratio:1/1;
border-radius:50%;
object-fit:cover;
background:white;
}

.channel-name{
margin-top:8px;
font-size:13px;
}

.channel.active img{
border:1.5px solid #7dffc0;
box-shadow:0 0 6px rgba(125,255,192,0.6);
}

@media (min-width:900px){

video{height:420px;}
#videoPlaceholder{height:420px;}
body{padding-top:420px;}

.channel{flex:0 0 120px;}

.channel img{
width:120px;
height:120px;
}

.section-title{font-size:22px;}

#prevBtn,#nextBtn{
display:block;
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:32px;
color:white;
background:rgba(0,0,0,0.5);
padding:12px 16px;
border-radius:50%;
cursor:pointer;
}

#prevBtn{left:15px;}
#nextBtn{right:15px;}

.channel.active img{
border:2px solid #7dffc0;
box-shadow:0 0 10px rgba(125,255,192,0.8);
}

}

</style>
</head>

<body>

<div class="player">

<video id="videoPlayer" controls playsinline></video>

<div id="prevBtn">❮</div>
<div id="nextBtn">❯</div>

<div id="videoPlaceholder">SK Television</div>

<div id="runningText">
<marquee>
আমাদের টিভি চ্যানেলের কাজ চলছে • নতুন নতুন টিভি যুক্ত করা হচ্ছে • তাই সাময়িক সমস্যার জন্য আমরা আন্তরিকভাবে দুঃখিত • যেকোনো সমস্যার জন্য ফোন করুন 
<span class="phone">01835303883</span> /
<span class="phone">01615303883</span>
</marquee>
</div>

</div>

<div class="section">
<div class="section-title">
<span>বাংলাদেশি চ্যানেল</span>
<span>View All</span>
</div>
<div class="channels" id="bdChannels"></div>
</div>

<div class="section">
<div class="section-title">
<span>Indian Channels</span>
<span>View All</span>
</div>
<div class="channels" id="indianChannels"></div>
</div>

<div class="section">
<div class="section-title">
<span>English Channels</span>
<span>View All</span>
</div>
<div class="channels" id="englishChannels"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

let hls=null;

/* channel create */

function createChannels(list,id){

const container=document.getElementById(id);
container.innerHTML="";

list.forEach((c)=>{

const div=document.createElement("div");
div.className="channel";

div.onclick=function(){
playChannel(c.link);
};

div.innerHTML=
`<img src="${c.logo}">
<div class="channel-name">${c.name}</div>`;

container.appendChild(div);

});

}

/* player */

function playChannel(url){

document.getElementById("videoPlaceholder").style.display="none";
document.getElementById("runningText").style.display="none";

const video=document.getElementById("videoPlayer");

if(hls){hls.destroy();}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}

}

</body>
</html>
