<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Television</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0014;
  color:white;
}

.player{
  width:100%;
  position:sticky;
  top:0;
  z-index:1000;
  background:black;
}

video{
  width:100%;
  height:220px;
  background:black;
}

.section{
  padding:20px 0;
}

.section-title{
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  margin-bottom:15px;
  font-size:18px;
}

.channels{
  display:flex;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:0 15px;
  gap:15px;
}

.channels::-webkit-scrollbar{
  display:none;
}

.channel{
  flex:0 0 22%;
  text-align:center;
  cursor:pointer;
}

.channel img{
  width:100%;
  aspect-ratio:1/1;
  border-radius:50%;
  object-fit:cover;
  background:white;
}

.channel-name{
  margin-top:8px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="player">
  <video id="videoPlayer" controls></video>
</div>

<!-- Bangladeshi Channels -->
<div class="section">
  <div class="section-title">
    <span>বাংলাদেশি চ্যানেল</span>
    <span>View All</span>
  </div>
  <div class="channels">

    <div class="channel" onclick="playChannel('https://owrcovcrpy.gpcdn.net/bpk-tv/1713/output/1713-audio_113432_eng=113200-video=2202800.m3u8')"LINK'>
      <img src="logo1.png">
      <div class="channel-name">Somoy TV</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_2')">
      <img src="logo2.png">
      <div class="channel-name">Jamuna TV</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_3')">
      <img src="logo3.png">
      <div class="channel-name">Channel 24</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_4')">
      <img src="logo4.png">
      <div class="channel-name">Ekattor TV</div>
    </div>

  </div>
</div>

<!-- Sports Channels -->
<div class="section">
  <div class="section-title">
    <span>Sports Channels</span>
    <span>View All</span>
  </div>
  <div class="channels">

    <div class="channel" onclick="playChannel('YOUR_LINK_5')">
      <img src="logo5.png">
      <div class="channel-name">T Sports</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_6')">
      <img src="logo6.png">
      <div class="channel-name">Sony Sports</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_7')">
      <img src="logo7.png">
      <div class="channel-name">Star Sports</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_8')">
      <img src="logo8.png">
      <div class="channel-name">ESPN</div>
    </div>

  </div>
</div>

<!-- News Channels -->
<div class="section">
  <div class="section-title">
    <span>News Channels</span>
    <span>View All</span>
  </div>
  <div class="channels">

    <div class="channel" onclick="playChannel('YOUR_LINK_9')">
      <img src="logo9.png">
      <div class="channel-name">ATN News</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_10')">
      <img src="logo10.png">
      <div class="channel-name">BBC News</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_11')">
      <img src="logo11.png">
      <div class="channel-name">CNN</div>
    </div>

    <div class="channel" onclick="playChannel('YOUR_LINK_12')">
      <img src="logo12.png">
      <div class="channel-name">Al Jazeera</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
function playChannel(url){
  var video = document.getElementById("videoPlayer");

  if (Hls.isSupported()) {
      var hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,function() {
          video.play();
      });
  }
  else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata',function() {
          video.play();
      });
  }
}
</script>

</body>
</html>
