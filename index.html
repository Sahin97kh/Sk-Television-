<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Television</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0014;
  color:white;
}

.player{
  position:sticky;
  top:0;
  background:black;
  z-index:1000;
}

video{
  width:100%;
  height:220px;
  background:black;
}

.section{
  padding:20px 0;
}

.section-title{
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  margin-bottom:15px;
  font-size:18px;
}

.channels{
  display:flex;
  overflow-x:auto;
  padding:0 15px;
  gap:15px;
}

.channels::-webkit-scrollbar{
  display:none;
}

.channel{
  flex:0 0 22%;
  text-align:center;
  cursor:pointer;
}

.channel img{
  width:100%;
  aspect-ratio:1/1;
  border-radius:50%;
  object-fit:cover;
  background:white;
}

.channel-name{
  margin-top:8px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="player">
  <video id="videoPlayer" controls></video>
</div>

<div class="section">
  <div class="section-title">
    <span>বাংলাদেশি চ্যানেল</span>
    <span>View All</span>
  </div>
  <div class="channels" id="bdChannels"></div>
</div>

<div class="section">
  <div class="section-title">
    <span>Sports Channels</span>
    <span>View All</span>
  </div>
  <div class="channels" id="sportsChannels"></div>
</div>

<div class="section">
  <div class="section-title">
    <span>News Channels</span>
    <span>View All</span>
  </div>
  <div class="channels" id="newsChannels"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

/* ====== শুধু এখানে এডিট করবে ====== */

const banglaChannels = [
  { name:"Somoy TV", logo:"logos/somoy.png", link:"LINK1" },
  { name:"Jamuna TV", logo:"logos/jamuna.png", link:"LINK2" },
  { name:"Channel 24", logo:"logos/channel24.png", link:"LINK3" },
  { name:"Ekattor", logo:"logos/ekattor.png", link:"LINK4" }
];

const sportsChannels = [
  { name:"T Sports", logo:"logos/tsports.png", link:"LINK5" },
  { name:"Star Sports", logo:"logos/star.png", link:"LINK6" },
  { name:"Sony Sports", logo:"logos/sony.png", link:"LINK7" },
  { name:"ESPN", logo:"logos/espn.png", link:"LINK8" }
];

const newsChannels = [
  { name:"ATN News", logo:"logos/atn.png", link:"LINK9" },
  { name:"BBC News", logo:"logos/bbc.png", link:"LINK10" },
  { name:"CNN", logo:"logos/cnn.png", link:"LINK11" },
  { name:"Al Jazeera", logo:"logos/aljazeera.png", link:"LINK12" }
];

/* ====== নিচে কিছুই বদলাবে না ====== */

let currentList = [];
let currentIndex = 0;
let hls;

function createChannels(list, containerId){
  const container = document.getElementById(containerId);

  list.forEach((channel,index) => {
    const div = document.createElement("div");
    div.className = "channel";
    div.onclick = function(){ startPlayback(list,index) };

    div.innerHTML = `
      <img src="${channel.logo}">
      <div class="channel-name">${channel.name}</div>
    `;

    container.appendChild(div);
  });
}

createChannels(banglaChannels,"bdChannels");
createChannels(sportsChannels,"sportsChannels");
createChannels(newsChannels,"newsChannels");

function startPlayback(list,index){
  currentList = list;
  currentIndex = index;
  playChannel(list[index].link);
}

function playChannel(url){
  const video = document.getElementById("videoPlayer");

  if(hls){
    hls.destroy();
  }

  if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.ERROR, function () {
          playNextChannel();
      });

      hls.on(Hls.Events.MANIFEST_PARSED,function() {
          video.play();
      });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
      video.onerror = function(){
        playNextChannel();
      };
  }
}

function playNextChannel(){
  currentIndex++;
  if(currentIndex < currentList.length){
    playChannel(currentList[currentIndex].link);
  }
}

</script>

</body>
</html>
