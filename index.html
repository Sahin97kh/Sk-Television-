<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Television</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0014;
  color:white;
}

/* Video Player Top */
.player{
  width:100%;
  background:black;
  position:sticky;
  top:0;
  z-index:1000;
}

video{
  width:100%;
  height:220px;
  background:black;
}

/* Section */
.section{
  padding:15px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  font-size:18px;
}

/* 4 channel per row */
.channels{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:15px;
}

.channel{
  width:100%;
  aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  background:white;
  cursor:pointer;
}

.channel img{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>
<body>

<!-- Video Player -->
<div class="player">
  <video id="videoPlayer" controls autoplay>
    <source id="videoSource" src="" type="application/x-mpegURL">
  </video>
</div>

<div class="section">

<script>
var testLink = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

function playChannel(url){
  var video = document.getElementById("videoPlayer");
  var source = document.getElementById("videoSource");
  source.src = url;
  video.load();
  video.play();
}
</script>
