<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>SK Television</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0014;
color:white;
padding-top:220px;
}

/* PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
background:black;
z-index:1000;
}

/* SLIDER */

#playerSlider{
position:absolute;
top:0;
left:0;
width:100%;
height:220px;
overflow:hidden;
z-index:5;
}

.sliderTrack{
display:flex;
width:300%;
height:100%;
transition:transform .6s ease;
}

.sliderTrack img{
width:100%;
height:100%;
object-fit:cover;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:28px;
color:white;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:50%;
cursor:pointer;
z-index:10;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

video{
width:100%;
height:220px;
background:black;
}

#videoPlaceholder{
position:absolute;
top:0;
left:0;
width:100%;
height:220px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
background:black;
color:white;
}

#runningText{
position:absolute;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,0.85);
color:#00ffd0;
font-size:13px;
padding:5px 0;
}

.phone{
color:red;
font-weight:bold;
}

/* CHANNEL */

.section{
padding:10px 0;
}

.section-title{
display:flex;
justify-content:space-between;
padding:0 15px;
margin-bottom:8px;
font-size:18px;
}

.channels{
display:flex;
overflow-x:auto;
padding:0 15px;
gap:15px;
}

.channels::-webkit-scrollbar{
display:none;
}

.channel{
flex:0 0 22%;
text-align:center;
cursor:pointer;
}

.channel img{
width:100%;
aspect-ratio:1/1;
border-radius:50%;
object-fit:cover;
background:white;
}

.channel-name{
margin-top:8px;
font-size:13px;
}

.channel.active img{
border:1.5px solid #7dffc0;
box-shadow:0 0 6px rgba(125,255,192,0.6);
}

</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

/* SLIDER */

let index=0;
const track=document.getElementById("sliderTrack");

function nextSlide(){
index++;
if(index>2){index=0;}
track.style.transform="translateX(-"+index*100+"%)";
}

function prevSlide(){
index--;
if(index<0){index=2;}
track.style.transform="translateX(-"+index*100+"%)";
}

setInterval(nextSlide,4000);

/* PLAYER */

let hls=null;
const defaultLogo="logos/IMG_20260305_175603.png";

function playChannel(url){

document.getElementById("playerSlider").style.display="none";
document.getElementById("videoPlaceholder").style.display="none";
document.getElementById("runningText").style.display="none";

const video=document.getElementById("videoPlayer");

if(hls){hls.destroy();}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}

}

function createChannels(list,id){

const container=document.getElementById(id);

list.forEach((c,index)=>{

const div=document.createElement("div");
div.className="channel";

div.onclick=function(){

document.querySelectorAll(".channel").forEach(ch=>{
ch.classList.remove("active");
});

div.classList.add("active");

playChannel(c.link);

};

div.innerHTML=
`<img src="${c.logo || defaultLogo}">
<div class="channel-name">${c.name}</div>`;

container.appendChild(div);

});

}
