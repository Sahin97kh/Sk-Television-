<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Television</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0014;
color:white;
padding-top:220px;
}

/* PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
background:black;
z-index:1000;
}

/* SLIDER */

#playerSlider{
position:absolute;
top:0;
left:0;
width:100%;
height:220px;
overflow:hidden;
z-index:5;
}

.sliderTrack{
display:flex;
width:300%;
height:100%;
transition:transform .6s ease;
}

.sliderTrack img{
width:100%;
height:100%;
object-fit:cover;
flex:0 0 100%;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:28px;
color:white;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:50%;
cursor:pointer;
z-index:10;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

video{
width:100%;
height:220px;
background:black;
}

#videoPlaceholder{
display:none;
}

/* TEXT */

#runningText{
position:absolute;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,0.85);
color:#00ffd0;
font-size:13px;
padding:5px 0;
}

.phone{
color:red;
font-weight:bold;
}

/* CHANNEL SECTION */

.section{
padding:10px 0;
}

.section-title{
display:flex;
justify-content:space-between;
padding:0 15px;
margin-bottom:8px;
font-size:18px;
}

.channels{
display:flex;
overflow-x:auto;
padding:0 15px;
gap:15px;
}

.channels::-webkit-scrollbar{
display:none;
}

.channel{
flex:0 0 22%;
text-align:center;
cursor:pointer;
}

.channel img{
width:100%;
aspect-ratio:1/1;
border-radius:50%;
object-fit:cover;
background:white;
}

.channel-name{
margin-top:8px;
font-size:13px;
}

.channel.active img{
border:1.5px solid #7dffc0;
box-shadow:0 0 6px rgba(125,255,192,0.6);
}

</style>
</head>

<body>

<div class="player">

<div id="playerSlider">
<div class="sliderTrack" id="sliderTrack">

<img src="https://sahin97kh.github.io/Sk-Television-/slider/1.jpg.png">
<img src="https://sahin97kh.github.io/Sk-Television-/slider/1772723116959.png">
<img src="https://sahin97kh.github.io/Sk-Television-/slider/IMG_20260305_210449.jpg">

</div>

<div class="arrow left" onclick="prevSlide()">❮</div>
<div class="arrow right" onclick="nextSlide()">❯</div>
</div>

<video id="videoPlayer" controls playsinline></video>

<div id="runningText">
<marquee>
আমাদের টিভি চ্যানেল এর কাজ চলছে, নতুন নতুন টিভি যুক্ত করা হচ্ছে।
ফোন করুনঃ 
<span class="phone">01835303883</span>
<span class="phone">01615303883</span>
</marquee>
</div>

</div>


<div class="section">
<div class="section-title">
<span>বাংলাদেশি চ্যানেল</span>
<span>View All</span>
</div>
<div class="channels" id="bdChannels"></div>
</div>


<div class="section">
<div class="section-title">
<span>Indian Channels</span>
<span>View All</span>
</div>
<div class="channels" id="indianChannels"></div>
</div>


<div class="section">
<div class="section-title">
<span>English Channels</span>
<span>View All</span>
</div>
<div class="channels" id="englishChannels"></div>
</div>


<div class="section">
<div class="section-title">
<span>News Channels</span>
<span>View All</span>
</div>
<div class="channels" id="newsChannels"></div>
</div>


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

/* SLIDER */

let slideIndex=0;
const slider=document.getElementById("sliderTrack");

function nextSlide(){
slideIndex++;
if(slideIndex>2){slideIndex=0;}
slider.style.transform="translateX(-"+slideIndex*100+"%)";
}

function prevSlide(){
slideIndex--;
if(slideIndex<0){slideIndex=2;}
slider.style.transform="translateX(-"+slideIndex*100+"%)";
}

setInterval(nextSlide,4000);

/* PLAYER */

let hls=null;

function playChannel(url){

const video=document.getElementById("videoPlayer");

document.getElementById("playerSlider").style.display="none";

if(hls){hls.destroy();}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});
}else{
video.src=url;
video.play();
}

}

function createChannels(list,id){

const container=document.getElementById(id);

list.forEach((c)=>{

const div=document.createElement("div");
div.className="channel";

div.onclick=function(){

document.querySelectorAll(".channel").forEach(ch=>{
ch.classList.remove("active");
});

div.classList.add("active");

playChannel(c.link);

};

div.innerHTML=
`<img src="${c.logo}">
<div class="channel-name">${c.name}</div>`;

container.appendChild(div);

});

}

{name:"B Vision",logo:"logos/images (3).jpeg",link:"https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/1715-audio_113452_eng=113200-video=2202800.m3u8"},
{name:"Somoy Tv",logo:"logos/images (1).png",link:"https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=2202800.m3u8"},

</body>
</html>
